<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .curtain {
            width: 100%;
            height: 100vh;
            background: red;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            clip-path: polygon(0 0, 0 100%, 50% 100%, 50% 0);
            animation: open 3s forwards;
        }
        @keyframes open {
            0% {
                clip-path: polygon(0 0, 0 100%, 50% 100%, 50% 0);
            }
            100% {
                clip-path: polygon(0 0, 0 100%, 100% 100%, 100% 0);
            }
        }
    </style>
</head>
<body>
    <div class="curtain"></div>
    <h1 style="position: relative; z-index: 1;">You're Invited!</h1>
</body>
</html>
